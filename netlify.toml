[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[plugins.inputs]
  disableNetlifyForms = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Let op: ik heb de CSP even weggelaten. 
    # Next.js 16 (met Turbopack) heeft vaak specifieke inline-scripts die je oude CSP blokkeert.
    # Krijg je de site live? Voeg dan pas de CSP weer stap voor stap toe.