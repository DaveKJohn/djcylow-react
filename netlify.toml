[build]
  command = "npm run build"
  publish = ".next"

# We laten de [[plugins]] sectie hier helemaal weg. 
# Netlify installeert de Next.js Runtime automatisch op basis van je package.json.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"