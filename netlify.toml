[dev]
  command = "npx @11ty/eleventy --serve"
  targetPort = 8080
  port = 8888
  publish = "dist"

[build]
  publish = "dist"
  environment = { NODE_VERSION = "20" }

[[header]]
  for = "/*"
  [header.values]
    Content-Security-Policy = "default-src 'self' www.googletagmanager.com www.google.com data:; connect-src 'self' www.googletagmanager.com www.google-analytics.com region1.google-analytics.com https://www.google.com https://www.gstatic.com; script-src 'self' 'unsafe-inline' 'nonce-MyS3cr3tStat1cN0nc3V4lu3==' 'strict-dynamic' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.google.com https://recaptcha.google.com https://www.youtube-nocookie.com https://www.youtube.com; media-src 'self' *.r2.dev; img-src 'self' data: https://i.ytimg.com;"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 2. Cache header voor Statische Assets
[[header]]
  for = "/css/*"
  [header.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[header]]
  for = "/js/*"
  [header.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[header]]
  for = "/image/*"
  [header.values]
    Cache-Control = "public, max-age=31536000, immutable"